  # rhasspy:
  #   image: "rhasspy/rhasspy"
  #   container_name: rhasspy
  #   restart: unless-stopped
  #   volumes:
  #     - /home/homeman/smarthome/rhasspy/profiles:/profiles
  #     - /etc/localtime:/etc/localtime:ro
  #   # ports:
  #   #   - "12101:12101"
  #   devices:
  #     - /dev/snd:/dev/snd
  #   command: --user-profiles /profiles --profile en
  #   network_mode: host

  reverse-proxy:
    container_name: reverse-proxy
    image: lscr.io/linuxserver/swag:5.6.0
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Kyiv
      - URL=$CERT_DOMAIN_NAME
      - SUBDOMAINS=
      - VALIDATION=dns
      - DNSPLUGIN=duckdns
      - EMAIL=$CERT_EMAIL
      - STAGING=false
      - DISABLE_F2B=true
    volumes:
      - ./swag:/config
    ports:
      - 443:443
      - 80:80