sync_heater_valves:
  alias: Sync heater valves with thermostat input booleans
  mode: restart
  variables:
    # When valves is open, switch is off
    entity_ids: |
      {% set fake_heater_valves = [
        states.input_boolean.thermostat_driven_heater_valve_master_bedroom,
        states.input_boolean.thermostat_driven_heater_valve_master_bathroom_hotfloor,
        states.input_boolean.thermostat_driven_heater_valve_cabinet,
        states.input_boolean.thermostat_driven_heater_valve_kid_small_bedroom,
        states.input_boolean.thermostat_driven_heater_valve_kid_big_bedroom,
        states.input_boolean.thermostat_driven_heater_valve_kid_bathroom_hotfloor,
        states.input_boolean.thermostat_driven_heater_valve_livingroom,
        states.input_boolean.thermostat_driven_heater_valve_livingroom_hotfloor_table,
        states.input_boolean.thermostat_driven_heater_valve_livingroom_hotfloor_fireplace,
        states.input_boolean.thermostat_driven_heater_valve_livingroom_hotfloor_exit,
        states.input_boolean.thermostat_driven_heater_valve_kitchen_hotfloor,
        states.input_boolean.thermostat_driven_heater_valve_entrance_room_hotfloor,
      ] %}

      {% set enabled_heaters = fake_heater_valves
        | selectattr('state', 'eq', 'on')
        | map(attribute='entity_id')
        | map('regex_replace', 'input_boolean.thermostat_driven_', 'switch.')
        | list
      %}

      {% if enabled_heaters | count == 0 %}
        {{{ 
          'turn_on': [],
          'turn_off': fake_heater_valves
            | map(attribute='entity_id')
            | map('regex_replace', 'input_boolean.thermostat_driven_', 'switch.')
            | list
        }}}
      {% else %}
        {% set disabled_heaters = fake_heater_valves
          | map(attribute='entity_id')
          | map('regex_replace', 'input_boolean.thermostat_driven_', 'switch.')
          | reject('in', enabled_heaters)
          | list
        %}
        {{{
          'turn_on': disabled_heaters,
          'turn_off': enabled_heaters
        }}}
      {% endif %}
  sequence:
    - if: 
      - condition: template
        value_template: "{{ entity_ids['turn_off'] | count > 0 }}"
      then:
        - service: switch.turn_off
          target:
            entity_id: "{{ entity_ids['turn_off'] | list }}"
    - if: 
      - condition: template
        value_template: "{{ entity_ids['turn_on'] | count > 0 }}"
      then:
        - service: switch.turn_on
          target:
            entity_id: "{{ entity_ids['turn_on'] | list }}"

toggle_hwc:
  alias: Toggle HWC
  fields:
    state:
      name: State
      required: true
      selector:
        boolean: ~
  variables:
    new_state: "{{ 'on' if state else 'off' }}"
  sequence:
    - if: 
      - condition: state
        entity_id: input_boolean.is_main_heater_connected_to_solar
        state: 'on'
      then:
        # - if: 
        #   - condition: state
        #     entity_id: switch.water_heater_2k
        #     state: 'on'
        #   then:
        #   - service: switch.turn_off
        #     target:
        #       entity_id: switch.water_heater_2k
        - service_template: "input_boolean.turn_{{ new_state }}"
          target:
            entity_id: input_boolean.hwc_enabled
      else: 
        # - if: 
        #   - condition: state
        #     entity_id: input_boolean.hwc_enabled
        #     state: 'on'
        #   then:
        #   - service: input_boolean.turn_off
        #     target:
        #       entity_id: input_boolean.hwc_enabled
        - service_template: "switch.turn_{{ new_state }}"
          target:
            entity_id: switch.water_heater_2k